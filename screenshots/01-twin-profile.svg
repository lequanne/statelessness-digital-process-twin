<svg viewBox="0 0 560 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="560" height="520" fill="#f5f4f0" rx="16"/>

  <!-- Header label -->
  <text x="28" y="30" font-size="11" fill="#9a9890" font-weight="500" letter-spacing="0.06em">DIGITAL TWIN — PROFILE VIEW</text>

  <!-- Metric cards row -->
  <rect x="20" y="44" width="120" height="52" fill="#eeede8" rx="8"/>
  <text x="32" y="62" font-size="10" fill="#6b6a66">UNHCR identified</text>
  <text x="32" y="82" font-size="18" fill="#1a1a18" font-weight="500">4.4M+</text>

  <rect x="148" y="44" width="120" height="52" fill="#eeede8" rx="8"/>
  <text x="160" y="62" font-size="10" fill="#6b6a66">States affected</text>
  <text x="160" y="82" font-size="18" fill="#1a1a18" font-weight="500">95</text>

  <rect x="276" y="44" width="120" height="52" fill="#eeede8" rx="8"/>
  <text x="288" y="62" font-size="10" fill="#6b6a66">UN Conventions</text>
  <text x="288" y="82" font-size="18" fill="#1a1a18" font-weight="500">1954 · 1961</text>

  <rect x="404" y="44" width="136" height="52" fill="#eeede8" rx="8"/>
  <text x="416" y="62" font-size="10" fill="#6b6a66">SDG 16.9 target</text>
  <text x="416" y="82" font-size="18" fill="#1a1a18" font-weight="500">2030</text>

  <!-- Twin profile card -->
  <rect x="20" y="112" width="238" height="388" fill="white" rx="12" stroke="#e0dfd9" stroke-width="0.5"/>

  <!-- Population selector -->
  <text x="36" y="138" font-size="9" fill="#9a9890" font-weight="500" letter-spacing="0.06em">POPULATION CATEGORY</text>
  <rect x="36" y="146" width="206" height="30" fill="#f5f4f0" rx="6" stroke="#c8c7c2" stroke-width="0.5"/>
  <text x="50" y="166" font-size="11" fill="#1a1a18">Rohingya — Myanmar / Bangladesh</text>
  <text x="224" y="166" font-size="11" fill="#6b6a66">▾</text>

  <rect x="36" y="184" width="206" height="28" fill="#eeede8" rx="6" stroke="#c8c7c2" stroke-width="0.5"/>
  <text x="124" y="202" font-size="11" fill="#1a1a18" text-anchor="middle">↻ Regenerate twin</text>

  <!-- Avatar -->
  <circle cx="74" cy="250" r="22" fill="#e6f1fb"/>
  <text x="74" y="256" font-size="14" fill="#185fa5" font-weight="500" text-anchor="middle">MU</text>

  <!-- Name / identity -->
  <text x="107" y="241" font-size="14" fill="#1a1a18" font-weight="500">Mohammed Ullah</text>
  <text x="107" y="257" font-size="11" fill="#6b6a66">Rohingya · age 34</text>
  <rect x="107" y="264" width="88" height="18" fill="#fcebeb" rx="9"/>
  <text x="151" y="276" font-size="10" fill="#a32d2d" text-anchor="middle">● extreme risk</text>

  <text x="107" y="296" font-size="9" fill="#9a9890" font-family="monospace">Twin ID: DT-ROH-47291</text>

  <!-- Field rows -->
  <line x1="36" y1="308" x2="222" y2="308" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="323" font-size="11" fill="#6b6a66">Origin</text>
  <text x="222" y="323" font-size="11" fill="#1a1a18" font-weight="500" text-anchor="end">Myanmar (Rakhine State)</text>

  <line x1="36" y1="332" x2="222" y2="332" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="347" font-size="11" fill="#6b6a66">Location</text>
  <text x="222" y="347" font-size="11" fill="#1a1a18" font-weight="500" text-anchor="end">Cox's Bazar, Bangladesh</text>

  <line x1="36" y1="356" x2="222" y2="356" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="371" font-size="11" fill="#6b6a66">Stateless for</text>
  <text x="222" y="371" font-size="11" fill="#1a1a18" font-weight="500" text-anchor="end">29 years</text>

  <line x1="36" y1="380" x2="222" y2="380" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="395" font-size="11" fill="#6b6a66">Population est.</text>
  <text x="222" y="395" font-size="11" fill="#1a1a18" font-weight="500" text-anchor="end">600,000+</text>

  <line x1="36" y1="404" x2="222" y2="404" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="419" font-size="11" fill="#6b6a66">Documentation</text>
  <text x="222" y="419" font-size="10" fill="#1a1a18" font-weight="500" text-anchor="end">None — no NRC, no birth cert.</text>

  <line x1="36" y1="428" x2="222" y2="428" stroke="#eeede8" stroke-width="0.5"/>
  <text x="36" y="443" font-size="11" fill="#6b6a66">Dependants</text>
  <text x="222" y="443" font-size="11" fill="#1a1a18" font-weight="500" text-anchor="end">3 children</text>

  <rect x="36" y="456" width="206" height="28" fill="#eeede8" rx="6" stroke="#c8c7c2" stroke-width="0.5"/>
  <text x="139" y="474" font-size="11" fill="#1a1a18" text-anchor="middle">Generate case file ↗</text>

  <!-- Rights panel (right side) -->
  <rect x="270" y="112" width="270" height="388" fill="white" rx="12" stroke="#e0dfd9" stroke-width="0.5"/>

  <!-- Tabs -->
  <rect x="270" y="112" width="270" height="38" fill="white" rx="12"/>
  <rect x="270" y="136" width="270" height="14" fill="white"/>
  <text x="288" y="136" font-size="11" fill="#1a1a18" font-weight="500">Rights map</text>
  <line x1="284" y1="148" x2="334" y2="148" stroke="#1a1a18" stroke-width="2"/>
  <text x="348" y="136" font-size="11" fill="#9a9890">Risk factors</text>
  <text x="418" y="136" font-size="11" fill="#9a9890">Solutions</text>
  <text x="480" y="136" font-size="11" fill="#9a9890">UN goals</text>
  <line x1="270" y1="150" x2="540" y2="150" stroke="#eeede8" stroke-width="0.5"/>

  <!-- Rights section label -->
  <text x="286" y="170" font-size="9" fill="#9a9890" font-weight="500" letter-spacing="0.06em">RIGHTS ACCESS VS 1954 CONVENTION STANDARD</text>

  <!-- Legend -->
  <rect x="286" y="178" width="10" height="10" fill="#378ADD" opacity="0.4" rx="2"/>
  <text x="300" y="188" font-size="10" fill="#6b6a66">Convention standard (100%)</text>
  <rect x="400" y="178" width="10" height="10" fill="#1D9E75" rx="2"/>
  <text x="414" y="188" font-size="10" fill="#6b6a66">Current access</text>

  <!-- Radar chart placeholder (octagon) -->
  <g transform="translate(405,285)">
    <!-- Outer octagon (standard) -->
    <polygon points="0,-80 57,-57 80,0 57,57 0,80 -57,57 -80,0 -57,-57" fill="rgba(55,138,221,0.08)" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4,3"/>
    <!-- Inner polygon (actual access) -->
    <polygon points="0,-6 10,-6 12,0 8,10 0,12 -8,8 -12,0 -8,-6" fill="rgba(29,158,117,0.2)" stroke="#1D9E75" stroke-width="1.5"/>
    <!-- Labels -->
    <text x="0" y="-90" font-size="9" fill="#6b6a66" text-anchor="middle">Identity</text>
    <text x="68" y="-64" font-size="9" fill="#6b6a66" text-anchor="start">Travel</text>
    <text x="88" y="4" font-size="9" fill="#6b6a66" text-anchor="start">Education</text>
    <text x="64" y="70" font-size="9" fill="#6b6a66" text-anchor="start">Employment</text>
    <text x="0" y="96" font-size="9" fill="#6b6a66" text-anchor="middle">Healthcare</text>
    <text x="-66" y="70" font-size="9" fill="#6b6a66" text-anchor="end">Housing</text>
    <text x="-92" y="4" font-size="9" fill="#6b6a66" text-anchor="end">Legal</text>
    <text x="-66" y="-64" font-size="9" fill="#6b6a66" text-anchor="end">Movement</text>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#1D9E75"/>
  </g>

  <!-- Rights bars -->
  <text x="286" y="382" font-size="9" fill="#9a9890">Art. 27 — Identity</text>
  <text x="524" y="382" font-size="9" fill="#6b6a66" text-anchor="end">5%</text>
  <rect x="286" y="387" width="238" height="4" fill="#eeede8" rx="2"/>
  <rect x="286" y="387" width="12" height="4" fill="#378ADD" rx="2"/>

  <text x="286" y="404" font-size="9" fill="#9a9890">Art. 28 — Travel</text>
  <text x="524" y="404" font-size="9" fill="#6b6a66" text-anchor="end">3%</text>
  <rect x="286" y="409" width="238" height="4" fill="#eeede8" rx="2"/>
  <rect x="286" y="409" width="7" height="4" fill="#7F77DD" rx="2"/>

  <text x="286" y="426" font-size="9" fill="#9a9890">Art. 22 — Education</text>
  <text x="524" y="426" font-size="9" fill="#6b6a66" text-anchor="end">28%</text>
  <rect x="286" y="431" width="238" height="4" fill="#eeede8" rx="2"/>
  <rect x="286" y="431" width="67" height="4" fill="#1D9E75" rx="2"/>

  <text x="286" y="448" font-size="9" fill="#9a9890">Art. 17–19 — Employment</text>
  <text x="524" y="448" font-size="9" fill="#6b6a66" text-anchor="end">12%</text>
  <rect x="286" y="453" width="238" height="4" fill="#eeede8" rx="2"/>
  <rect x="286" y="453" width="29" height="4" fill="#BA7517" rx="2"/>

  <text x="286" y="470" font-size="9" fill="#9a9890">Art. 24 — Healthcare</text>
  <text x="524" y="470" font-size="9" fill="#6b6a66" text-anchor="end">22%</text>
  <rect x="286" y="475" width="238" height="4" fill="#eeede8" rx="2"/>
  <rect x="286" y="475" width="52" height="4" fill="#639922" rx="2"/>

  <!-- Footer note -->
  <text x="40" y="506" font-size="10" fill="#9a9890">Proxy data sourced from UNHCR Global Trends · OSJI · Institute on Statelessness and Inclusion</text>
</svg>
